<!DOCTYPE html>
<html>
<head>
<title>Blood Request</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Blood Request Form</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="donor.html">Become Donor</a>
<a href="request.html">Request Blood</a>
<a href="search.html">Search Donor</a>
</nav>

<div class="container">

<h2>Request Blood</h2>

<form id="requestForm">

<input type="text" id="patient" placeholder="Patient Name">

<select id="bloodgroup">
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
</select>

<input type="number" id="units" placeholder="Units Required">

<input type="text" id="hospital" placeholder="Hospital Name">

<input type="text" id="contact" placeholder="Contact">

<button type="submit">Submit Request</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
